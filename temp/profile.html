<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Magic Bot AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: 
            
            color: #0d131a;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-size: 24px; font-weight: 700; color: #60a5fa; text-decoration: none; }
        .nav-actions { display: flex; gap: 20px; align-items: center; }
        .logout-btn {
            background: rgba(148, 163, 184, 0.1); color: #e2e8f0; border: 1px solid rgba(148, 163, 184, 0.3);
            padding: 10px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 13px;
            text-transform: uppercase;
        }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .profile-card {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 16px; padding: 40px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; }
        .form-control {
            width: 100%; padding: 12px 16px; background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.4); border-radius: 8px; color: #e2e8f0;
        }
        .btn-primary {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #60a5fa, #3b82f6);
            border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer;
        }
        .badge {
            background: #3b82f6; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; text-transform: uppercase;
        }
        .badge.admin { background: #ef4444; }
        .alert {
            background: rgba(96, 165, 250, 0.2); border: 1px solid rgba(96, 165, 250, 0.4);
            border-radius: 8px; color: #60a5fa; padding: 15px; margin-bottom: 30px; text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="navbar-brand">Magic Bot AI</a>
            <div class="nav-actions">
                <a href="{{ url_for('my_bots') }}" class="logout-btn">My Bots</a>
                <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert">
                    {% for message in messages %}
                        <div>{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        <div class="profile-card">
            <h1 style="margin-bottom: 30px;">User Profile</h1>
            <form method="POST" action="{{ url_for('profile') }}">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" value="{{ user.username }}" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <div>
                        <span class="badge {{ 'admin' if role == 'admin' else '' }}">{{ role }}</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email or '' }}">
                </div>
                <button type="submit" class="btn-primary">Update Profile</button>
            </form>
        </div>
    </div>
</body>
</html>
