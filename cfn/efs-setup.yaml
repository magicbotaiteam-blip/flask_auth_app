AWSTemplateFormatVersion: '2010-09-09'
Description: EFS filesystem for flask-auth-app persistent storage

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where ECS tasks run
    Default: vpc-0a3f5c6e8a4b2d1f0

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets where EFS mount targets will be created
    Default: subnet-031507eb0eceb8ce1,subnet-04b27c1e2f3a8d5c7,subnet-06e1f2a3b4c5d6e7f

  SecurityGroupIds:
    Type: CommaDelimitedList
    Description: Security groups to allow NFS traffic (port 2049) from ECS tasks
    Default: sg-0a1b2c3d4e5f6g7h8

  FilesystemName:
    Type: String
    Default: flask-auth-app-efs
    Description: Name tag for the EFS filesystem

Resources:
  # EFS Filesystem
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Name: !Ref FilesystemName
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: !Ref FilesystemName
        - Key: Environment
          Value: production

  # Mount targets in all AZs where tasks run
  EFSMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups: !Ref SecurityGroupIds

  EFSMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups: !Ref SecurityGroupIds

  EFSMountTargetC:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [2, !Ref SubnetIds]
      SecurityGroups: !Ref SecurityGroupIds

  # Security group to allow NFS traffic from ECS tasks
  EFSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS NFS access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ECSTaskSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${FilesystemName}-sg"

Outputs:
  FileSystemId:
    Description: EFS filesystem ID
    Value: !Ref EFSFileSystem

  FileSystemApId:
    Description: Access point ID for mounting
    Value: !Ref EFSAccessPoint

  SecurityGroupId:
    Description: Security group for NFS access
    Value: !Ref EFSecurityGroup
