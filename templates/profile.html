{% extends "base.html" %}
{% block title %}Profile - AI Magic Bot{% endblock %}
{% block content %}
{% with active_page='profile' %}
{% include '_sidebar.html' %}
<div class="sidebar-content">
{% endwith %}

<div class="container" style="max-width: 700px; margin: 40px auto; padding: 0 20px;">
    <div class="card border-0 shadow-lg" style="background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border-radius: 24px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa, #a78bfa); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <i class="bi bi-person-fill text-white" style="font-size: 2.5rem;"></i>
                </div>
                <h2 class="fw-bold" style="color: #e2e8f0;">{{ user.username }}</h2>
                <span class="badge bg-primary bg-opacity-75 px-3 py-2" style="border-radius: 20px; font-weight: 600;">{{ role }}</span>
            </div>

            <hr style="border-color: rgba(148, 163, 184, 0.15);">

            <form method="POST" action="{{ url_for('profile') }}" class="mt-4">
                <div class="mb-4">
                    <label class="form-label fw-semibold" style="color: #cbd5e1;">
                        <i class="bi bi-person me-1"></i> Username
                    </label>
                    <input type="text" class="form-control" value="{{ user.username }}" disabled
                           style="background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 12px; color: #94a3b8; padding: 12px 16px;">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold" style="color: #cbd5e1;">
                        <i class="bi bi-envelope me-1"></i> Email
                    </label>
                    <input type="email" name="email" class="form-control" value="{{ user.email or '' }}"
                           style="background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 12px; color: #e2e8f0; padding: 12px 16px;">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold" style="color: #cbd5e1;">
                        <i class="bi bi-calendar me-1"></i> Member since
                    </label>
                    <input type="text" class="form-control" value="{{ user.created_at }}" disabled
                           style="background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 12px; color: #94a3b8; padding: 12px 16px;">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" style="border-radius: 14px;">
                    <i class="bi bi-check-lg me-1"></i> Update Profile
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
