<!-- Authenticated Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item ms-3">
                    <a href="{{ url_for('profile') }}" class="btn btn-outline-light" style="border-radius: 10px; padding: 6px 16px; font-weight: 500; border-width: 2px;">
                        <i class="bi bi-person me-1"></i> {{ username }}
                    </a>
                </li>
                <li class="nav-item ms-2">
                    <a href="{{ url_for('logout') }}" class="btn btn-primary" style="border-radius: 10px; padding: 6px 16px; font-weight: 600;">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div style="padding-top: 80px;"></div>

<script>
window.addEventListener('scroll', function() {
    const navbar = document.querySelector('.navbar');
    if (window.scrollY > 50) navbar.classList.add('scrolled');
    else navbar.classList.remove('scrolled');
});
</script>
