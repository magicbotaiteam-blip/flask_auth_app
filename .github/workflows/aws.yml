name: Build, Push, and Deploy to ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: flask-auth-app
  ECS_CLUSTER: flask-auth-app-cluster
  ECS_SERVICE: flask-auth-app-705a
  # ALB listener rule for www.magicaibots.com (Rule 2 on HTTPS:443 listener)
  LISTENER_RULE_ARN: arn:aws:elasticloadbalancing:us-east-1:404006608636:listener-rule/app/ecs-express-gateway-alb-09703220/94a812b45a64d63b/6cf5a0b04ef7190f/10eca0f36e70d0d1

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          --build-arg GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
          --build-arg GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Force new ECS deployment
      id: deploy
      run: |
        aws ecs update-service \
          --cluster ${{ env.ECS_CLUSTER }} \
          --service ${{ env.ECS_SERVICE }} \
          --force-new-deployment \
          --no-cli-pager
        echo "Force new deployment triggered"

    - name: Wait for deployment to complete
      run: |
        echo "Waiting for ECS deployment to complete..."
        # Increase waiter timeout (--max-wait-seconds overrides the default ~10 min)
        # 300 seconds = 5 minutes between checks, up to 15 minutes total
        timeout 900 aws ecs wait services-stable \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ env.ECS_SERVICE }} \
          --no-cli-pager \
        || true
        # Even if the waiter fails, give Express Mode time to stabilize
        # The next step (get-tg) polls for healthy targets anyway
        sleep 30
        echo "Proceeding to check Express Mode target group"

    - name: Get active target group from Express Mode listener rules
      id: get-tg
      run: |
        # Express Mode auto-manages listener rules and updates them on each
        # deployment. List all HTTPS:443 rules, skip the default rule and
        # our custom rule, then grab the TG ARN from the Express-managed rule.
        #
        # IMPORTANT: Express Mode may swap target groups AFTER ecs wait
        # services-stable completes. We poll until the TG is stable
        # (2 consecutive identical reads with healthy targets).
        LISTENER_ARN="arn:aws:elasticloadbalancing:us-east-1:404006608636:listener/app/ecs-express-gateway-alb-09703220/94a812b45a64d63b/6cf5a0b04ef7190f"
        OUR_RULE_ARN="${{ env.LISTENER_RULE_ARN }}"

        extract_tg() {
          aws elbv2 describe-rules --listener-arn "$LISTENER_ARN" --output json | \
            jq -r --arg our_rule "$OUR_RULE_ARN" \
              '.Rules[] | select(.Priority != "default") | select(.RuleArn != $our_rule) |
              .Actions[0].ForwardConfig.TargetGroups[0].TargetGroupArn' | head -1
        }

        PREV_TG=""
        SAME_COUNT=0
        MAX_ATTEMPTS=30

        for i in $(seq 1 $MAX_ATTEMPTS); do
          CURRENT_TG=$(extract_tg)
          if [ -z "$CURRENT_TG" ] || [ "$CURRENT_TG" = "null" ]; then
            echo "Attempt $i: No Express-managed rule found yet, waiting..."
            sleep 10
            continue
          fi

          # Check if the TG has healthy targets
          HEALTHY=$(aws elbv2 describe-target-health \
            --target-group-arn "$CURRENT_TG" \
            --query 'TargetHealthDescriptions[?TargetHealth.State==`healthy`] | length(@)' \
            --output text 2>/dev/null || echo "0")

          echo "Attempt $i: TG=$CURRENT_TG, healthy=$HEALTHY, prev=$PREV_TG"

          if [ "$CURRENT_TG" = "$PREV_TG" ] && [ "$HEALTHY" -gt 0 ]; then
            SAME_COUNT=$((SAME_COUNT + 1))
            echo "Same TG with healthy targets for $SAME_COUNT consecutive checks"
            if [ $SAME_COUNT -ge 2 ]; then
              echo "Target group is stable and healthy. Using: $CURRENT_TG"
              echo "target_group_arn=$CURRENT_TG" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            SAME_COUNT=0
            PREV_TG="$CURRENT_TG"
          fi

          sleep 10
        done

        echo "ERROR: Could not find stable target group with healthy targets after $((MAX_ATTEMPTS * 10)) seconds"
        exit 1

    - name: Update listener rule for www.magicaibots.com
      run: |
        TARGET_GROUP_ARN="${{ steps.get-tg.outputs.target_group_arn }}"
        echo "Updating listener rule ${{ env.LISTENER_RULE_ARN }} to forward to $TARGET_GROUP_ARN"
        
        aws elbv2 modify-rule \
          --rule-arn ${{ env.LISTENER_RULE_ARN }} \
          --actions "[{\"Type\": \"forward\", \"TargetGroupArn\": \"$TARGET_GROUP_ARN\", \"ForwardConfig\": {\"TargetGroups\": [{\"TargetGroupArn\": \"$TARGET_GROUP_ARN\", \"Weight\": 100}]}}]" \
          --no-cli-pager
        echo "Listener rule updated successfully!"
        echo "https://www.magicaibots.com should work after DNS propagation."
