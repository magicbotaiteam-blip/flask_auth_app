name: Build and Push to Amazon ECR

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: flask-auth-app
  ECS_CLUSTER: flask-auth-app-cluster
  ECS_SERVICE: flask-auth-app-705a

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        S3_BUCKET_NAME: flask-auth-app-uploads
      run: |
        docker build \
          --build-arg GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
          --build-arg GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
          --build-arg S3_BUCKET_NAME=${{ env.S3_BUCKET_NAME }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Update ALB listener rule to correct target group (before deploy)
      run: |
        ALB_ARN="arn:aws:elasticloadbalancing:us-east-1:404006608636:loadbalancer/app/ecs-express-gateway-alb-09703220/94a812b45a64d63b"
        CORRECT_TG_ARN="arn:aws:elasticloadbalancing:us-east-1:404006608636:targetgroup/ecs-gateway-tg-747807c47cdd4471c/dbde0c33289ccfdc"
        LISTENER_PORT=443

        echo "Fetching listener ARN for port $LISTENER_PORT..."
        LISTENER_ARN=$(aws elbv2 describe-listeners \
          --load-balancer-arn "$ALB_ARN" \
          --query "Listeners[?Port==\`$LISTENER_PORT\`].ListenerArn" \
          --output text \
          --no-cli-pager)

        echo "Listener ARN: $LISTENER_ARN"

        echo "Fetching current listener rules..."
        RULES=$(aws elbv2 describe-rules \
          --listener-arn "$LISTENER_ARN" \
          --no-cli-pager)

        # Find the rule for www.magicaibots.com
        RULE_ARN=$(echo "$RULES" | jq -r '.Rules[] | select(.Priority != "default") | select(.Conditions[]? | select(.Field == "host-header") | .Values[] | contains("magicaibots.com")) | .RuleArn' | head -1)

        if [ -z "$RULE_ARN" ] || [ "$RULE_ARN" = "null" ]; then
          echo "WARNING: Could not find listener rule for magicaibots.com. Skipping rule update."
          echo "Current rules:"
          echo "$RULES" | jq '.Rules[] | {priority: .Priority, conditions: .Conditions}' 2>/dev/null || echo "$RULES"
        else
          echo "Found rule: $RULE_ARN"
          
          # Update the rule to forward to the correct target group
          aws elbv2 modify-rule \
            --rule-arn "$RULE_ARN" \
            --actions "[{\"Type\": \"forward\", \"ForwardConfig\": {\"TargetGroups\": [{\"TargetGroupArn\": \"$CORRECT_TG_ARN\", \"Weight\": 100}]}}]" \
            --no-cli-pager
          
          echo "✅ Listener rule updated to forward to the correct target group."
        fi

    - name: Force new ECS deployment
      id: deploy
      run: |
        aws ecs update-service \
          --cluster ${{ env.ECS_CLUSTER }} \
          --service ${{ env.ECS_SERVICE }} \
          --force-new-deployment \
          --no-cli-pager
        echo "Force new deployment triggered (Express Mode will auto-pick up latest image)"

    - name: Wait for deployment to stabilize
      run: |
        echo "Waiting for ECS deployment to complete..."
        aws ecs wait services-stable \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ env.ECS_SERVICE }} \
          --no-cli-pager
        echo "Deployment stable."

    - name: Delete old stale target groups (no registered targets)
      run: |
        echo "Cleaning up stale target groups..."
        STALE_TGS=$(aws elbv2 describe-target-groups \
          --load-balancer-arn "arn:aws:elasticloadbalancing:us-east-1:404006608636:loadbalancer/app/ecs-express-gateway-alb-09703220/94a812b45a64d63b" \
          --query "TargetGroups[?TargetGroupName!='ecs-gateway-tg-747807c47cdd4471c'].TargetGroupArn" \
          --output text \
          --no-cli-pager)
        
        for TG in $STALE_TGS; do
          TARGETS=$(aws elbv2 describe-target-health --target-group-arn "$TG" --query 'TargetHealthDescriptions[].Target.Id' --output text --no-cli-pager 2>/dev/null || echo "none")
          if [ -z "$TARGETS" ] || [ "$TARGETS" = "none" ]; then
            echo "Deleting stale target group: $TG"
            aws elbv2 delete-target-group --target-group-arn "$TG" --no-cli-pager 2>/dev/null || echo "Could not delete $TG (may be in use)"
          fi
        done
        echo "Cleanup complete."
