name: Build and Push to Amazon ECR

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: flask-auth-app
  ECS_CLUSTER: flask-auth-app-cluster
  ECS_SERVICE: flask-auth-app-705a

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
        S3_BUCKET_NAME: flask-auth-app-uploads
      run: |
        docker build \
          --build-arg GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
          --build-arg GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
          --build-arg S3_BUCKET_NAME=${{ env.S3_BUCKET_NAME }} \
          --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Determine the correct target group from the service
      id: find-tg
      run: |
        echo "Finding the target group that this service actually uses..."
        # Get services, find the target group with registered healthy targets
        TASK_ARN=$(aws ecs list-tasks --cluster ${{ env.ECS_CLUSTER }} --service-name ${{ env.ECS_SERVICE }} --query 'taskArns[0]' --output text --no-cli-pager)
        ENI_ID=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks "$TASK_ARN" --query 'tasks[0].attachments[0].details[?name=="networkInterfaceId"].value' --output text --no-cli-pager)
        
        # Find which target group has this ENI registered
        ALB_ARN="arn:aws:elasticloadbalancing:us-east-1:404006608636:loadbalancer/app/ecs-express-gateway-alb-09703220/94a812b45a64d63b"
        TGS=$(aws elbv2 describe-target-groups --load-balancer-arn "$ALB_ARN" --query 'TargetGroups[].TargetGroupArn' --output text --no-cli-pager)
        
        ACTIVE_TG=""
        for TG in $TGS; do
          HEALTHY=$(aws elbv2 describe-target-health --target-group-arn "$TG" --query 'TargetHealthDescriptions[?TargetHealth.State==`healthy`].Target.Id' --output text --no-cli-pager 2>/dev/null)
          if echo "$HEALTHY" | grep -q "$ENI_ID"; then
            ACTIVE_TG="$TG"
            break
          fi
        done
        
        if [ -z "$ACTIVE_TG" ]; then
          # Fallback: use the one with any registered targets
          for TG in $TGS; do
            HEALTHY=$(aws elbv2 describe-target-health --target-group-arn "$TG" --query 'TargetHealthDescriptions[].Target.Id' --output text --no-cli-pager 2>/dev/null)
            if [ -n "$HEALTHY" ]; then
              ACTIVE_TG="$TG"
              break
            fi
          done
        fi

        echo "Active target group: $ACTIVE_TG"
        echo "active-tg=$ACTIVE_TG" >> $GITHUB_OUTPUT

    - name: Force new ECS deployment
      id: deploy
      run: |
        aws ecs update-service \
          --cluster ${{ env.ECS_CLUSTER }} \
          --service ${{ env.ECS_SERVICE }} \
          --force-new-deployment \
          --no-cli-pager
        echo "Force new deployment triggered (Express Mode will auto-pick up latest image)"

    - name: Wait for deployment to stabilize
      run: |
        echo "Waiting for ECS deployment to complete..."
        aws ecs wait services-stable \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ env.ECS_SERVICE }} \
          --no-cli-pager
        echo "Deployment stable."

    - name: Update ALB listener rule to the correct target group (after deploy)
      run: |
        ACTIVE_TG="${{ steps.find-tg.outputs.active-tg }}"
        ALB_ARN="arn:aws:elasticloadbalancing:us-east-1:404006608636:loadbalancer/app/ecs-express-gateway-alb-09703220/94a812b45a64d63b"
        LISTENER_PORT=443

        if [ -z "$ACTIVE_TG" ] || [ "$ACTIVE_TG" = "null" ]; then
          echo "WARNING: Could not determine active target group. Checking current target groups..."
          TGS=$(aws elbv2 describe-target-groups --load-balancer-arn "$ALB_ARN" --query 'TargetGroups[].TargetGroupArn' --output text --no-cli-pager)
          for TG in $TGS; do
            HEALTHY=$(aws elbv2 describe-target-health --target-group-arn "$TG" --query 'TargetHealthDescriptions[]' --output json --no-cli-pager 2>/dev/null)
            echo "TG $TG: $HEALTHY"
          done
          exit 1
        fi

        echo "Fetching listener ARN for port $LISTENER_PORT..."
        LISTENER_ARN=$(aws elbv2 describe-listeners \
          --load-balancer-arn "$ALB_ARN" \
          --query "Listeners[?Port==\`$LISTENER_PORT\`].ListenerArn" \
          --output text \
          --no-cli-pager)

        echo "Listener ARN: $LISTENER_ARN"

        echo "Fetching current listener rules..."
        RULES=$(aws elbv2 describe-rules \
          --listener-arn "$LISTENER_ARN" \
          --no-cli-pager)

        # Find the rule for www.magicaibots.com
        RULE_ARN=$(echo "$RULES" | jq -r '.Rules[] | select(.Priority != "default") | select(.Conditions[]? | select(.Field == "host-header") | .Values[] | contains("magicaibots.com")) | .RuleArn' | head -1)

        if [ -z "$RULE_ARN" ] || [ "$RULE_ARN" = "null" ]; then
          echo "WARNING: Could not find listener rule for magicaibots.com. Skipping rule update."
          echo "Current rules:"
          echo "$RULES" | jq '.Rules[] | {priority: .Priority, conditions: .Conditions, actions: [.Actions[].TargetGroupArn]}' 2>/dev/null
        else
          echo "Found rule: $RULE_ARN"
          echo "Current target group(s): $(echo "$RULES" | jq -r --arg RULE "$RULE_ARN" '.Rules[] | select(.RuleArn == $RULE) | .Actions[].TargetGroupArn' 2>/dev/null)"
          
          # Update the rule to forward to the active target group
          aws elbv2 modify-rule \
            --rule-arn "$RULE_ARN" \
            --actions "[{\"Type\": \"forward\", \"ForwardConfig\": {\"TargetGroups\": [{\"TargetGroupArn\": \"$ACTIVE_TG\", \"Weight\": 100}]}}]" \
            --no-cli-pager
          
          echo "✅ Listener rule updated to forward to target group: $ACTIVE_TG"
        fi

    - name: Delete old stale target groups (no registered targets)
      run: |
        ACTIVE_TG="${{ steps.find-tg.outputs.active-tg }}"
        echo "Cleaning up stale target groups..."
        ALB_ARN="arn:aws:elasticloadbalancing:us-east-1:404006608636:loadbalancer/app/ecs-express-gateway-alb-09703220/94a812b45a64d63b"
        ALL_TGS=$(aws elbv2 describe-target-groups \
          --load-balancer-arn "$ALB_ARN" \
          --query 'TargetGroups[].TargetGroupArn' \
          --output text \
          --no-cli-pager)
        
        for TG in $ALL_TGS; do
          if [ "$TG" = "$ACTIVE_TG" ]; then
            echo "Skipping active TG: $TG"
            continue
          fi
          TARGETS=$(aws elbv2 describe-target-health --target-group-arn "$TG" --query 'TargetHealthDescriptions[].Target.Id' --output text --no-cli-pager 2>/dev/null || echo "")
          if [ -z "$TARGETS" ]; then
            echo "Deleting stale target group: $TG"
            aws elbv2 delete-target-group --target-group-arn "$TG" --no-cli-pager 2>/dev/null || echo "Could not delete $TG (may be in use)"
          fi
        done
        echo "Cleanup complete."
