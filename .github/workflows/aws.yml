name: Build and Push to Amazon ECR

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: flask-auth-app
  ECS_CLUSTER: flask-auth-app-cluster
  ECS_SERVICE: flask-auth-app-705a

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          --build-arg GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
          --build-arg GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Force new ECS deployment
      run: |
        set -x
        # Get the full current task definition
        TASK_DEF_FAMILY=${{ env.ECS_CLUSTER }}-${{ env.ECS_SERVICE }}
        echo "Task definition family: $TASK_DEF_FAMILY"
        TASK_DEF_JSON=$(aws ecs describe-task-definition \
          --task-definition "$TASK_DEF_FAMILY" \
          --region ${{ env.AWS_REGION }} \
          --query 'taskDefinition' \
          --output json) || { echo "Failed to get task def"; exit 1; }
        echo "Got task def"
        
        # Update the image to use the new SHA tag (unique per build)
        NEW_IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        echo "New image: $NEW_IMAGE"
        UPDATED_JSON=$(echo "$TASK_DEF_JSON" | jq --arg img "$NEW_IMAGE" '
          .containerDefinitions[0].image = $img |
          del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
        ') || { echo "Failed to update JSON"; exit 1; }
        
        # Register a new task definition revision
        echo "Registering new task definition..."
        aws ecs register-task-definition \
          --cli-input-json "$UPDATED_JSON" \
          --region ${{ env.AWS_REGION }} \
          --no-cli-pager 2>&1 || { echo "Failed to register task def"; exit 1; }
        
        # Update the service to use the latest task definition
        echo "Updating service..."
        aws ecs update-service \
          --cluster ${{ env.ECS_CLUSTER }} \
          --service ${{ env.ECS_SERVICE }} \
          --task-definition "$TASK_DEF_FAMILY" \
          --force-new-deployment \
          --no-cli-pager 2>&1 || { echo "Failed to update service"; exit 1; }
        
        echo "Deployed with image: $NEW_IMAGE"
