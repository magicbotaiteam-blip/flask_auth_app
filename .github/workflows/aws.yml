name: Build, Push, and Deploy to ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: flask-auth-app
  ECS_CLUSTER: flask-auth-app-cluster
  ECS_SERVICE: flask-auth-app-705a
  # ALB listener rule for www.magicaibots.com (Rule 2 on HTTPS:443 listener)
  LISTENER_RULE_ARN: arn:aws:elasticloadbalancing:us-east-1:404006608636:listener-rule/app/ecs-express-gateway-alb-09703220/94a812b45a64d63b/6cf5a0b04ef7190f/10eca0f36e70d0d1

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          --build-arg GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
          --build-arg GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Force new ECS deployment
      id: deploy
      run: |
        aws ecs update-service \
          --cluster ${{ env.ECS_CLUSTER }} \
          --service ${{ env.ECS_SERVICE }} \
          --force-new-deployment \
          --no-cli-pager
        echo "Force new deployment triggered"

    - name: Wait for deployment to complete
      run: |
        echo "Waiting for ECS deployment to complete..."
        aws ecs wait services-stable \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ env.ECS_SERVICE }}
        echo "Deployment stable"

    - name: Get target group from current service revision
      id: get-tg
      run: |
        # Get the most recent successful deployment
        DEPLOYMENTS=$(aws ecs describe-services \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ env.ECS_SERVICE }} \
          --query 'services[0].deployments' \
          --output json)
        
        # Get the task definition ARN from the primary (running) deployment
        TASK_DEF_ARN=$(echo "$DEPLOYMENTS" | jq -r '.[] | select(.status == "PRIMARY") | .taskDefinition')
        echo "Task definition: $TASK_DEF_ARN"
        
        # Get the load balancer config from the service
        LB_CONFIG=$(aws ecs describe-services \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ env.ECS_SERVICE }} \
          --query 'services[0].loadBalancers[0].targetGroupArn' \
          --output text)
        echo "target_group_arn=$LB_CONFIG" >> $GITHUB_OUTPUT
        echo "Target group: $LB_CONFIG"

    - name: Update listener rule for www.magicaibots.com
      run: |
        TARGET_GROUP_ARN="${{ steps.get-tg.outputs.target_group_arn }}"
        echo "Updating listener rule ${{ env.LISTENER_RULE_ARN }} to forward to $TARGET_GROUP_ARN"
        
        aws elbv2 modify-rule \
          --rule-arn ${{ env.LISTENER_RULE_ARN }} \
          --actions "[{\"Type\": \"forward\", \"TargetGroupArn\": \"$TARGET_GROUP_ARN\", \"ForwardConfig\": {\"TargetGroups\": [{\"TargetGroupArn\": \"$TARGET_GROUP_ARN\", \"Weight\": 100}]}}]" \
          --no-cli-pager
        echo "Listener rule updated successfully!"
        echo "https://www.magicaibots.com should work after DNS propagation."
